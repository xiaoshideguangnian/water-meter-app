name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      - name: Setup Gradle (use 8.4)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'   # ★ 必须和你的 wrapper 版本一致

      - name: Locate Gradle project root
        id: proj_dir
        run: |
          if [ -f settings.gradle ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            FOUND=$(find . -name settings.gradle -print -quit)
            if [ -n "$FOUND" ]; then
              echo "dir=$(dirname $FOUND)" >> $GITHUB_OUTPUT
            else
              echo "::error::No Gradle project found!"
              exit 1
            fi
          fi

      - name: Build APK (with verbose logs)
        run: gradle -p ${{ steps.proj_dir.outputs.dir }} assembleDebug --info --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: ${{ steps.proj_dir.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk

      # 即使构建失败，也上传日志以便分析
      - name: Upload build logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ steps.proj_dir.outputs.dir }}/app/build/reports/
            ${{ steps.proj_dir.outputs.dir }}/app/build/tmp/
